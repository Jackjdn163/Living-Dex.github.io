<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Dex Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="pokeball">
            <div class="pokeball-center"></div>
        </div>
        <div id="loadingText">Loading<span id="loadingDots">.</span></div>
    </div>

    <!-- HEADER -->
    <header>
        <h1>Living Dex Tracker</h1>

        <div class="controls">
            <input id="searchBar" type="text" placeholder="Search Pokémon...">

            <select id="sortSelect">
                <option value="dex">Sort by Dex</option>
                <option value="name">Sort by Name</option>
                <option value="caught">Caught First</option>
                <option value="uncaught">Uncaught First</option>
            </select>

            <label class="toggle">
                <input type="checkbox" id="shinyToggle">
                <span>Shiny</span>
            </label>

            <label class="toggle">
                <input type="checkbox" id="darkModeToggle">
                <span>Dark Mode</span>
            </label>

            <button id="resetBtn">Reset</button>
        </div>
    </header>

    <!-- PROGRESS -->
    <section id="progressSection">
        <p id="progress">0.00% complete</p>

        <div id="genProgress">
            <p id="gen1Progress">Gen 1: 0.00%</p>
            <p id="gen2Progress">Gen 2: 0.00%</p>
            <p id="gen3Progress">Gen 3: 0.00%</p>
            <p id="gen4Progress">Gen 4: 0.00%</p>
            <p id="gen5Progress">Gen 5: 0.00%</p>
            <p id="gen6Progress">Gen 6: 0.00%</p>
            <p id="gen7Progress">Gen 7: 0.00%</p>
            <p id="gen8Progress">Gen 8: 0.00%</p>
            <p id="gen9Progress">Gen 9: 0.00%</p>
        </div>
    </section>

    <!-- LIST -->
    <ul id="taskList"></ul>

    <!-- RESET POPUP -->
    <div id="resetPopup" class="hidden popup">
        <div class="popup-content">
            <p>Are you sure you want to reset all progress?</p>
            <button id="confirmReset">Yes</button>
            <button id="cancelReset">No</button>
        </div>
    </div>

    <!-- INFO PANEL -->
    <div id="infoPanel" class="hidden">
        <button id="closeInfoPanel">✕</button>

        <div id="infoContent">
            <div id="infoSprite"></div>
            <h2 id="infoName"></h2>
            <div id="infoGames"></div>
            <div id="infoEvolutions"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
