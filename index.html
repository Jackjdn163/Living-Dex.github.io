<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============================================================
         LOADING SCREEN
    ============================================================ -->
    <div id="loadingScreen">
        <div class="loading-content">
            <div class="pokeball">
                <div class="pokeball-top"></div>
                <div class="pokeball-bottom"></div>
                <div class="pokeball-center"></div>
            </div>
            <div id="loadingText">Loading<span id="loadingDots"></span></div>
        </div>
    </div>

    <!-- ============================================================
         MAIN CONTAINER
    ============================================================ -->
    <div class="container">
        <h1>Pokédex Tracker</h1>

        <input id="searchBar" type="text" placeholder="Search Pokémon...">

        <select id="sortSelect">
            <option value="dex">Sort by Dex</option>
            <option value="name">Sort by Name</option>
            <option value="caught">Sort by Caught</option>
            <option value="uncaught">Sort by Uncaught</option>
        </select>

        <button id="resetBtn">Reset Progress</button>

        <ul id="taskList"></ul>
    </div>

    <!-- ============================================================
         FLOATING STATS BOX
    ============================================================ -->
    <div id="floatingStats">
        <div id="progress">0% complete</div>
        <div id="genProgress">
            <div id="gen1Progress">Gen 1: 0%</div>
            <div id="gen2Progress">Gen 2: 0%</div>
            <div id="gen3Progress">Gen 3: 0%</div>
            <div id="gen4Progress">Gen 4: 0%</div>
            <div id="gen5Progress">Gen 5: 0%</div>
            <div id="gen6Progress">Gen 6: 0%</div>
            <div id="gen7Progress">Gen 7: 0%</div>
            <div id="gen8Progress">Gen 8: 0%</div>
            <div id="gen9Progress">Gen 9: 0%</div>
        </div>
    </div>

    <!-- ============================================================
         FLOATING TOGGLES
    ============================================================ -->
    <div id="floatingToggles">

        <label class="switch">
            <input type="checkbox" id="shinyToggle">
            <span class="slider"></span>
            <span class="switch-label">Show Shiny</span>
        </label>

        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
            <span class="switch-label">Dark Mode</span>
        </label>

    </div>

    <!-- ============================================================
         RESET POPUP
    ============================================================ -->
    <div id="resetPopup" class="popup hidden">
        <div class="popup-box">
            <p>Are you sure you want to reset all progress?</p>
            <div class="popup-buttons">
                <button id="confirmReset" class="danger">Reset</button>
                <button id="cancelReset">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
         INFO PANEL (WITH WRAPPER)
    ============================================================ -->
    <div id="infoPanel">
        <button id="closeInfoPanel" class="closeInfoBtn">×</button>

        <div id="infoContent">

            <div id="infoTopRow">
                <div id="infoSprite"></div>
                <div id="infoTypes"></div>
            </div>

            <h2 id="infoName"></h2>

            <div id="infoGames"></div>

            <div id="infoEvolutions"></div>

        </div>
    </div>

    <!-- ============================================================
         SCRIPT
    ============================================================ -->
    <script src="script.js"></script>

</body>
</html>
