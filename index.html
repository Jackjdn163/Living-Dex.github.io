<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LOADING SCREEN -->
    <div id="loadingScreen">
        <div class="loading-content">
           <div class="pokeball">
    <div class="pokeball-top"></div>
    <div class="pokeball-band"></div>
    <div class="pokeball-bottom"></div>
    <div class="pokeball-button"></div>
           </div>
            <div id="loadingText">Loading<span id="loadingDots"></span></div>
        </div>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="container">
        <h1>Pokédex Tracker</h1>

        <input id="searchBar" type="text" placeholder="Search Pokémon...">

        <select id="sortSelect">
            <option value="dex">Sort by Dex</option>
            <option value="name">Sort by Name</option>
            <option value="caught">Sort by Caught</option>
            <option value="uncaught">Sort by Uncaught</option>
        </select>

        <button id="resetBtn">Reset Progress</button>

        <ul id="taskList"></ul>
    </div>

    <!-- FLOATING STATS BOX -->
    <div id="floatingStats" class="floatingBox">

        <!-- FULL POKEDEX BAR -->
         <h3 class="genBarsTitle">Pokédex Completion</h3>
        <div id="fullDexRow" class="fullDexRow">
            <span class="fullDexLabel">Total</span>
            <div class="fullDexBar">
                <div class="fullDexFill"></div>
                <div class="fullDexCrown">👑</div>
            </div>
            <span class="fullDexPercent">0%</span>
        </div>

        <!-- GENERATION PROGRESS BARS -->
        <div id="genProgress" class="genBars">

            <div class="genRow" data-gen="1">
                <span class="genLabel">Gen 1</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="2">
                <span class="genLabel">Gen 2</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="3">
                <span class="genLabel">Gen 3</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="4">
                <span class="genLabel">Gen 4</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="5">
                <span class="genLabel">Gen 5</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="6">
                <span class="genLabel">Gen 6</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="7">
                <span class="genLabel">Gen 7</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="8">
                <span class="genLabel">Gen 8</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

            <div class="genRow" data-gen="9">
                <span class="genLabel">Gen 9</span>
                <div class="genBar"><div class="genFill"></div></div>
                <span class="genPercent">0%</span>
            </div>

        </div>
    </div>

    <!-- FLOATING TOGGLES -->
    <div id="floatingToggles" class="floatingBox">

        <label class="switch">
            <input type="checkbox" id="shinyToggle">
            <span class="slider"></span>
            <span class="switch-label">Show Shiny</span>
        </label>

        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
            <span class="switch-label">Dark Mode</span>
        </label>

    </div>

    <!-- RESET POPUP -->
    <div id="resetPopup" class="popup hidden">
        <div class="popup-box">
            <p>Are you sure you want to reset all progress?</p>
            <div class="popup-buttons">
                <button id="confirmReset" class="danger">Reset</button>
                <button id="cancelReset">Cancel</button>
            </div>
        </div>
    </div>

    <!-- INFO PANEL -->
    <div id="infoPanel">
        <button id="closeInfoPanel" class="closeInfoBtn">×</button>

        <div id="infoContent">

            <div id="infoTopRow">
                <div id="infoSprite"></div>
                <div id="infoTypes"></div>
            </div>

            <h2 id="infoName"></h2>

            <div id="infoGames"></div>

            <div id="infoEvolutions"></div>

        </div>
    </div>

    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
