<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Dex Checklist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Living Dex Checklist</h1>

        <!-- Search bar -->
        <input id="searchBar" type="text" placeholder="Search Pokémon...">

        <!-- Percentage always visible -->
        <div id="progress">0% complete</div>

        <!-- Reset button -->
        <button id="resetBtn">Reset Checklist</button>

        <!-- Pokémon list -->
        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
