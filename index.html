<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ============================================================
         LOADING SCREEN
    ============================================================ -->
    <div id="loadingScreen">
        <div class="loading-content">
            <div class="pokeball">
                <div class="pokeball-top"></div>
                <div class="pokeball-bottom"></div>
                <div class="pokeball-center"></div>
            </div>
            <div id="loadingText">Loading<span id="loadingDots"></span></div>
        </div>
    </div>

    <!-- ============================================================
         MAIN CONTAINER
    ============================================================ -->
    <div class="container">
        <h1>Pokédex Tracker</h1>

        <input id="searchBar" type="text" placeholder="Search Pokémon...">

        <select id="sortSelect">
            <option value="dex">Sort by Dex</option>
            <option value="name">Sort by Name</option>
            <option value="caught">Sort by Caught</option>
            <option value="uncaught">Sort by Uncaught</option>
        </select>

        <button id="resetBtn">Reset Progress</button>

        <ul id="taskList"></ul>
    </div>

    <!-- ============================================================
         FLOATING STATS BOX (MAIN RING + MINI GEN RINGS)
    ============================================================ -->
    <div id="floatingStats" class="floatingBox">

        <!-- MAIN PROGRESS RING -->
        <div id="progressRing">
            <svg>
                <circle class="bg" cx="60" cy="60" r="60"></circle>
                <circle class="fg" cx="60" cy="60" r="60"></circle>
            </svg>
            <div id="progressText">0%</div>
        </div>

        <!-- MINI GENERATION RINGS -->
        <div id="genProgress" class="genGrid">

            <!-- GEN 1 -->
            <div class="genCircle" data-gen="1">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 1<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 2 -->
            <div class="genCircle" data-gen="2">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 2<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 3 -->
            <div class="genCircle" data-gen="3">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 3<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 4 -->
            <div class="genCircle" data-gen="4">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 4<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 5 -->
            <div class="genCircle" data-gen="5">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 5<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 6 -->
            <div class="genCircle" data-gen="6">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 6<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 7 -->
            <div class="genCircle" data-gen="7">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 7<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 8 -->
            <div class="genCircle" data-gen="8">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 8<br><span class="genPercent">0%</span></div>
            </div>

            <!-- GEN 9 -->
            <div class="genCircle" data-gen="9">
                <svg>
                    <circle class="bg"></circle>
                    <circle class="fg"></circle>
                </svg>
                <div class="genLabel">Gen 9<br><span class="genPercent">0%</span></div>
            </div>

        </div>
    </div>

    <!-- ============================================================
         FLOATING TOGGLES
    ============================================================ -->
    <div id="floatingToggles" class="floatingBox">

        <label class="switch">
            <input type="checkbox" id="shinyToggle">
            <span class="slider"></span>
            <span class="switch-label">Show Shiny</span>
        </label>

        <label class="switch">
            <input type="checkbox" id="darkModeToggle">
            <span class="slider"></span>
            <span class="switch-label">Dark Mode</span>
        </label>

    </div>

    <!-- ============================================================
         RESET POPUP
    ============================================================ -->
    <div id="resetPopup" class="popup hidden">
        <div class="popup-box">
            <p>Are you sure you want to reset all progress?</p>
            <div class="popup-buttons">
                <button id="confirmReset" class="danger">Reset</button>
                <button id="cancelReset">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ============================================================
         INFO PANEL
    ============================================================ -->
    <div id="infoPanel">
        <button id="closeInfoPanel" class="closeInfoBtn">×</button>

        <div id="infoContent">

            <div id="infoTopRow">
                <div id="infoSprite"></div>
                <div id="infoTypes"></div>
            </div>

            <h2 id="infoName"></h2>

            <div id="infoGames"></div>

            <div id="infoEvolutions"></div>

        </div>
    </div>

    <!-- ============================================================
         SCRIPT
    ============================================================ -->
    <script src="script.js"></script>

</body>
</html>
