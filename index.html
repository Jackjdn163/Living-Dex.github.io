<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Dex Checklist</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Floating Stats Box -->
    <div id="floatingStats">
        <div id="progress">0.00% complete</div>
        <div id="genProgress">
            <div id="gen1Progress">Gen 1: 0.00%</div>
            <div id="gen2Progress">Gen 2: 0.00%</div>
            <div id="gen3Progress">Gen 3: 0.00%</div>
            <div id="gen4Progress">Gen 4: 0.00%</div>
            <div id="gen5Progress">Gen 5: 0.00%</div>
            <div id="gen6Progress">Gen 6: 0.00%</div>
            <div id="gen7Progress">Gen 7: 0.00%</div>
            <div id="gen8Progress">Gen 8: 0.00%</div>
            <div id="gen9Progress">Gen 9: 0.00%</div>
        </div>
    </div>

    <div class="container">
        <h1>Living Dex Checklist</h1>

        <input id="searchBar" type="text" placeholder="Search Pokémon...">

        <label class="toggle">
            <input type="checkbox" id="shinyToggle">
            Shiny sprites
        </label>

        <label class="toggle">
            <input type="checkbox" id="darkModeToggle">
            Dark Mode
        </label>

        <select id="sortSelect">
            <option value="dex">Sort by Dex</option>
            <option value="name">Sort by Name</option>
            <option value="caught">Sort by Caught</option>
            <option value="uncaught">Sort by Uncaught</option>
        </select>

        <button id="resetBtn">Reset Checklist</button>

        <ul id="taskList"></ul>
    </div>

    <!-- Bottom Sheet -->
    <div id="bottomSheet">
        <div id="sheetHandle"></div>

        <div id="sheetContent">
            <div id="sheetHeader">
                <img id="sheetSprite" src="" alt="Sprite">
                <div>
                    <div id="sheetName"></div>
                    <div id="sheetDex"></div>
                </div>
            </div>

            <div id="sheetTypes"></div>

            <!-- Game list + DLC badge inserted dynamically -->
            <div id="sheetDlcTag"></div>

            <h3>Evolution</h3>
            <div id="sheetEvolution"></div>
        </div>
    </div>

    <!-- IMPORTANT: loads the new script -->
    <script src="script.js"></script>
</body>
</html>
